services:
  # 认证服务 
  auth:
    build:
      context: ../backend/internal/auth
      dockerfile: Dockerfile
    container_name: auth
    ports:
      - "8080:8080"
      - "9000:9000"
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ../backend/internal/common/config:/root/ems/backend/internal/common/config

  # 用户服务
  user:
    build:
      context: ../backend/internal/user
      dockerfile: Dockerfile
    container_name: user
    ports:
      - "8081:8081"
      - "9001:9001"
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ../backend/internal/common/config:/root/ems/backend/internal/common/config
  # 库存服务
  warehouse:
    build:
      context: ../backend/internal/warehouse
      dockerfile: Dockerfile
    container_name: warehouse
    ports:
      - "8082:8082"
      - "9002:9002"
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ../backend/internal/common/config:/root/ems/backend/internal/common/config
  # 调度服务
  scheduling:
    build:
      context: ../backend/internal/scheduling
      dockerfile: Dockerfile
    container_name: scheduling
    ports:
      - "8083:8083"
      - "9003:9003"
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ../backend/internal/common/config:/root/ems/backend/internal/common/config
  # 统计服务
  statistics:
    build:
      context: ../backend/internal/statistics
      dockerfile: Dockerfile
    container_name: statistics
    ports:
      - "8084:8084"
      - "9004:9004"
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ../backend/internal/common/config:/root/ems/backend/internal/common/config

  # postgres database
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=123456
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ../backend/migration:/docker-entrypoint-initdb.d

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ../backend/internal/common/observation/otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - 1888:1888 # pprof extension
      - 8888:8888 # Prometheus metrics exposed by the Collector
      - 8889:8889 # Prometheus exporter metrics
      - 13133:13133 # health_check extension
      - "14317:4317" #
      - "14318:4318" #
      - "9464:9464" #
    depends_on:
      - jaeger

  jaeger:
    image: "jaegertracing/all-in-one:latest"
    container_name: jaeger
    ports:
      - "6831:6831"
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: true

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ../backend/internal/common/observation/metrics/:/etc/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
