openapi: 3.0.0
info:
  title: Warehouse Service API
  version: 1.0.0
  description: Warehouse, item, and inventory management for the Rescue Management System
paths:
  /api/v1/items:
    get:
      summary: List Items
      operationId: listItems
      tags:
        - Items
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            format: int32
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            format: int32
        - name: query
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of items
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    format: int32
                  size:
                    type: integer
                    format: int32
                  total:
                    type: integer
                    format: int32
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
    post:
      summary: Create Item
      operationId: createItem
      tags:
        - Items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - unit
              properties:
                name:
                  type: string
                unit:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
  /api/v1/items/{itemId}:
    get:
      summary: Get Item
      operationId: getItem
      tags:
        - Items
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
    put:
      summary: Update Item
      operationId: updateItem
      tags:
        - Items
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                unit:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
    delete:
      summary: Delete Item
      operationId: deleteItem
      tags:
        - Items
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Item deleted
  /api/v1/warehouses:
    get:
      summary: List Warehouses
      operationId: listWarehouses
      tags:
        - Warehouses
      responses:
        '200':
          description: List of warehouses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Warehouse'
    post:
      summary: Create Warehouse
      operationId: createWarehouse
      tags:
        - Warehouses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                location:
                  type: string
      responses:
        '201':
          description: Warehouse created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
  /api/v1/warehouses/{id}:
    get:
      summary: Get Warehouse
      operationId: getWarehouse
      tags:
        - Warehouses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Warehouse details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
    put:
      summary: Update Warehouse
      operationId: updateWarehouse
      tags:
        - Warehouses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                location:
                  type: string
      responses:
        '200':
          description: Warehouse updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
    delete:
      summary: Delete Warehouse
      operationId: deleteWarehouse
      tags:
        - Warehouses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Warehouse deleted
  /api/v1/warehouses/{id}/inventory:
    get:
      summary: Get Inventory
      operationId: getInventory
      tags:
        - Inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    itemId:
                      type: integer
                      format: int32
                    name:
                      type: string
                    quantity:
                      type: integer
                      format: int32
  /api/v1/warehouses/{id}/inventory/add:
    post:
      summary: Add Inventory
      operationId: addInventory
      tags:
        - Inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - itemId
                - amount
              properties:
                itemId:
                  type: integer
                  format: int32
                amount:
                  type: integer
                  format: int32
      responses:
        '200':
          description: Inventory added
          content:
            application/json:
              schema:
                type: object
                properties:
                  itemId:
                    type: integer
                    format: int32
                  quantity:
                    type: integer
                    format: int32
  /api/v1/warehouses/{id}/inventory/remove:
    post:
      summary: Remove Inventory
      operationId: removeInventory
      tags:
        - Inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - itemId
                - amount
              properties:
                itemId:
                  type: integer
                  format: int32
                amount:
                  type: integer
                  format: int32
      responses:
        '200':
          description: Inventory removed
        '400':
          description: Insufficient inventory
  /api/v1/alerts/threshold:
    put:
      summary: Set Inventory Threshold
      operationId: setThreshold
      tags:
        - Alerts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - itemId
                - threshold
              properties:
                itemId:
                  type: integer
                  format: int32
                threshold:
                  type: integer
                  format: int32
      responses:
        '200':
          description: Threshold set
  /api/v1/alerts:
    get:
      summary: List Inventory Alerts
      operationId: listAlerts
      tags:
        - Alerts
      responses:
        '200':
          description: List of items below threshold
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    itemId:
                      type: integer
                      format: int32
                    name:
                      type: string
                    quantity:
                      type: integer
                      format: int32
                    threshold:
                      type: integer
                      format: int32
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Item:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        unit:
          type: string
        description:
          type: string
    Warehouse:
      type: object
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        location:
          type: string
security:
  - bearerAuth: []
