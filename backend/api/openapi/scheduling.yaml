openapi: 3.0.0
info:
  title: Scheduling Service API
  version: 1.0.0
  description: Demand scheduling and logistics management for the Rescue Management System
paths:
  /api/v1/requests:
    get:
      summary: List Requests
      operationId: listRequests
      tags:
        - Requests
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            format: int32
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            format: int32
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    format: int32
                  size:
                    type: integer
                    format: int32
                  total:
                    type: integer
                    format: int32
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/Request'
    post:
      summary: Create Request
      operationId: createRequest
      tags:
        - Requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - location
                - items
              properties:
                title:
                  type: string
                location:
                  type: string
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/ItemQuantity'
      responses:
        '201':
          description: Request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
  /api/v1/requests/{id}:
    get:
      summary: Get Request
      operationId: getRequest
      tags:
        - Requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
    put:
      summary: Update Request
      operationId: updateRequest
      tags:
        - Requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                assignedTo:
                  type: integer
                  format: int32
      responses:
        '200':
          description: Request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Request'
    delete:
      summary: Delete Request
      operationId: deleteRequest
      tags:
        - Requests
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Request deleted
  /api/v1/shipments:
    get:
      summary: List Shipments
      operationId: listShipments
      tags:
        - Shipments
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            format: int32
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            format: int32
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    format: int32
                  size:
                    type: integer
                    format: int32
                  total:
                    type: integer
                    format: int32
                  shipments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Shipment'
    post:
      summary: Create Shipment
      operationId: createShipment
      tags:
        - Shipments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requestId
                - fromWarehouseId
                - toLocation
                - items
              properties:
                requestId:
                  type: integer
                  format: int32
                fromWarehouseId:
                  type: integer
                  format: int32
                toLocation:
                  type: string
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/ItemQuantity'
      responses:
        '201':
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
  /api/v1/shipments/{shipmentId}:
    get:
      summary: Get Shipment
      operationId: getShipment
      tags:
        - Shipments
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Shipment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
  /api/v1/shipments/{shipmentId}/status:
    put:
      summary: Update Shipment Status
      operationId: updateShipmentStatus
      tags:
        - Shipments
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                location:
                  type: string
                timestamp:
                  type: string
      responses:
        '200':
          description: Shipment status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Request:
      type: object
      properties:
        id:
          type: integer
          format: int32
        title:
          type: string
        location:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemQuantity'
        status:
          type: string
        assignedTo:
          type: integer
          format: int32
    Shipment:
      type: object
      properties:
        shipmentId:
          type: integer
          format: int32
        requestId:
          type: integer
          format: int32
        fromWarehouseId:
          type: integer
          format: int32
        toLocation:
          type: string
        status:
          type: string
        tracking:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              location:
                type: string
              timestamp:
                type: string
    ItemQuantity:
      type: object
      properties:
        itemId:
          type: integer
          format: int32
        quantity:
          type: integer
          format: int32
security:
  - bearerAuth: []
