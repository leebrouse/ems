openapi: 3.0.0
info:
  title: Auth Service API
  version: 1.0.0
  description: Authentication service for the Rescue Management System
paths:
  /api/v1/auth/login:
    post:
      summary: User Login
      operationId: login
      description: Login with username and password to receive a JWT token.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        format: int32
                      username:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
        '401':
          description: Unauthorized
  /api/v1/auth/logout:
    post:
      summary: User Logout
      operationId: logout
      description: Logout the user (client should discard the token).
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
