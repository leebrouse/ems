services:

  # postgres database
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=123456
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

